name: Sync followed handles from config (manual)

# Manual-only: overwrites the Supabase followed_handles table with the
# FOLLOWED_HANDLES list in pipeline/themes_config.py. The DB list normally
# wins (so UI edits persist); run this when you want config to take over.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Replace followed_handles with the config list
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: spx_dashboard/pipeline
        run: python sync_followed.py
