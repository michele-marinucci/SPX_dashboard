name: Generate morning news summary

on:
  schedule:
    # 9:12 AM ET. EST is UTC-5 (9:12am = 14:12 UTC); EDT is UTC-4 (9:12am = 13:12 UTC).
    # Two crons so it lands at ~9am ET regardless of DST — only the active one
    # fires in any given month. NB: deliberately :12 past the hour, not :00 —
    # GitHub frequently delays/drops scheduled runs at the top of the hour
    # (its most congested slot), which was silently skipping this job.
    - cron: "12 14 * 11,12,1,2,3 *"   # Nov–Mar (EST, UTC-5): 9:12am ET = 14:12 UTC
    - cron: "12 13 * 4,5,6,7,8,9,10 *" # Apr–Oct (EDT, UTC-4): 9:12am ET = 13:12 UTC
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Hours of inbox mail to pull. Blank = auto (24h, or 72h on Mondays to span the weekend)."
        required: false
        default: ""

concurrency:
  group: morning-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r spx_dashboard/pipeline/requirements.txt

      - name: Fetch newsletters and generate summary
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Blank on scheduled runs → run_news.py picks the weekend-aware default
          # (24h, or 72h on Mondays). A non-empty manual input overrides it.
          NEWS_LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MORNING_NEWS_RECIPIENTS: ${{ secrets.MORNING_NEWS_RECIPIENTS }}
          MORNING_NEWS_FROM: ${{ secrets.GMAIL_ADDRESS }}
        run: python spx_dashboard/pipeline/run_news.py

      - name: Commit updated morning news data (triggers Vercel redeploy)
        run: |
          if [ -z "$(git status --porcelain spx_dashboard/data/morning_news.json)" ]; then
            echo "No changes to morning_news.json; nothing to deploy."
            exit 0
          fi
          git config user.name "spx-dashboard-bot"
          git config user.email "actions@github.com"
          git add spx_dashboard/data/morning_news.json
          git commit -m "data: morning news summary $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $i failed; re-syncing and retrying..."
            sleep 5
          done
          echo "push failed after 5 attempts" >&2
          exit 1
