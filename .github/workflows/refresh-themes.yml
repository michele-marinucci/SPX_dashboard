name: Refresh Twitter Monitor

on:
  schedule:
    # Mon/Wed/Fri at 10:00 UTC (6am EDT). GitHub cron is UTC, so this drifts to
    # 5am local for the EST half of the year (no DST handling on the runner).
    - cron: "0 10 * * 1,3,5"
  workflow_dispatch: {}

concurrency:
  group: refresh-themes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r spx_dashboard/pipeline/requirements.txt

      - name: Scrape followed accounts and refresh the tweet store
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          # Optional: when set, the store + digests are mirrored into Supabase
          # and the UI-editable (shared) followed list drives the scrape.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python spx_dashboard/pipeline/run_twitter.py

      - name: Commit refreshed store (triggers Vercel redeploy)
        run: |
          if [ -z "$(git status --porcelain spx_dashboard/data/tweets.json)" ]; then
            echo "No feed changes; nothing to deploy."
            exit 0
          fi
          git config user.name "spx-dashboard-bot"
          git config user.email "actions@github.com"
          git add spx_dashboard/data/tweets.json
          git commit -m "data: refresh Twitter Monitor store"
          # Rebase-and-retry: concurrent jobs (e.g. morning-news) may push to
          # main mid-run, which would otherwise reject this push.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $i failed; re-syncing and retrying..."
            sleep 5
          done
          echo "push failed after 5 attempts" >&2
          exit 1
