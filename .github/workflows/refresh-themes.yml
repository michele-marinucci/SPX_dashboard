name: Refresh X Themes feed

on:
  schedule:
    # 10:00 UTC = 6am EDT. Note: GitHub cron is UTC, so this drifts to 5am
    # local for the EST half of the year (no DST handling on the runner).
    - cron: "0 10 * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh-themes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r spx_dashboard/pipeline/requirements.txt

      - name: Scout X and refresh themes feed
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python spx_dashboard/pipeline/run_themes.py

      - name: Commit refreshed feed (triggers Vercel redeploy)
        run: |
          if [ -n "$(git status --porcelain spx_dashboard/data/themes.json)" ]; then
            git config user.name "spx-dashboard-bot"
            git config user.email "actions@github.com"
            git add spx_dashboard/data/themes.json
            git commit -m "data: refresh X Themes feed"
            git push
          else
            echo "No feed changes; nothing to deploy."
          fi
