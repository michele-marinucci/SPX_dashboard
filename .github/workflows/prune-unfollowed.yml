name: Prune unfollowed tweets (manual, one-time)

# Manual-only: removes tweets from handles no longer in FOLLOWED_HANDLES from
# both data/tweets.json and the Supabase `tweets` table. Idempotent.
on:
  workflow_dispatch:

concurrency:
  group: refresh-themes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Prune unfollowed tweets (file + Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: spx_dashboard/pipeline
        run: python prune_unfollowed.py

      - name: Commit pruned store (triggers Vercel redeploy)
        run: |
          if [ -n "$(git status --porcelain spx_dashboard/data/tweets.json)" ]; then
            git config user.name "spx-dashboard-bot"
            git config user.email "actions@github.com"
            git add spx_dashboard/data/tweets.json
            git commit -m "data: prune unfollowed tweets from store"
            git push
          else
            echo "No file changes; Supabase cleanup (if any) already applied."
          fi
